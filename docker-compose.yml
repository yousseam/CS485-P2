version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ai-spec-postgres
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: ai_spec_breakdown
      POSTGRES_INITDB_ARGS: "-E UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
      - ./backend/docker-entrypoint-initdb.d/init-db.sh:/docker-entrypoint-initdb.d/01-init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-spec-network

  backend:
    build: ./backend
    container_name: ai-spec-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env
      - path: backend/.env
        required: false
    environment:
      - NODE_ENV=development
      - PORT=3001
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=ai_spec_breakdown
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - OPENAI_MODEL=gpt-4o
      - ANTHROPIC_MODEL=claude-3-5-sonnet-20241022
      - GEMINI_MODEL=gemini-flash-latest
      # AI_PROVIDER comes from .env / backend/.env (default in app: gemini when set there)
      - JWT_SECRET=your-secret-key-change-in-production
      # Browser uses localhost:5173; CORS also allows host.docker.internal in dev (see server.js)
      - FRONTEND_URL=http://localhost:5173,http://host.docker.internal:5173
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - ai-spec-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

networks:
  ai-spec-network:
    driver: bridge

volumes:
  postgres_data:
